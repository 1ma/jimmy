name: jimmy

services:
  node:
    image: 1maa/bitcoin:v29.2.knots20251110
    command: -regtest -listenonion=0 -v2transport=0 -debug=net
    healthcheck:
      test: netstat -ltn | grep 18443 > /dev/null
      start_interval: 125ms
      start_period: 500ms
    ports:
      - "127.0.0.1:18444:18444"
    restart: on-failure
    volumes:
      - node_data:/home/bitcoin/.bitcoin

volumes:
  node_data:
